version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: alphacouncil-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mantle
      POSTGRES_PASSWORD: ${DB_PASSWORD:-memorygraph}
      POSTGRES_DB: memorygraph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantle -d memorygraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alphacouncil

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: alphacouncil-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mantle:${DB_PASSWORD:-memorygraph}@db:5432/memorygraph
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alphacouncil
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      target: worker
    container_name: alphacouncil-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mantle:${DB_PASSWORD:-memorygraph}@db:5432/memorygraph
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alphacouncil

  bot:
    build:
      context: .
      target: bot
    container_name: alphacouncil-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://mantle:${DB_PASSWORD:-memorygraph}@db:5432/memorygraph
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alphacouncil
    profiles:
      - bot

  nginx:
    image: nginx:alpine
    container_name: alphacouncil-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - alphacouncil

volumes:
  pgdata:

networks:
  alphacouncil:
    driver: bridge
